name: Publish to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular app
        run: |
          npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Add GitHub Pages SPA fallback
        run: |
          cat > dist/cornhole/browser/404.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <script>
                (function () {
                  var pathSegmentsToKeep = 1;
                  var l = window.location;
                  var repoPath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
                  var routePath = l.pathname.slice(repoPath.length).replace(/^\//, '');
                  var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                    repoPath + '/?/' + routePath +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash;
                  l.replace(redirect);
                })();
              </script>
            </head>
            <body></body>
          </html>
          EOF
          touch dist/cornhole/browser/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cornhole/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
