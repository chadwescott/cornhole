<ch-card title="Game Summary">
  <ng-container header>
    <button type="button" mat-icon-button class="button--close" (click)="close.emit()">
      <i class="fas fa-times"></i>
    </button>
  </ng-container>
  <ng-container content>
    <ch-game-throws [game]="game()"></ch-game-throws>
    <ch-game-points [game]="game()"></ch-game-points>
    <ch-round-scores [game]="game()"></ch-round-scores>
  </ng-container>
</ch-card>
