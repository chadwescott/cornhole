<div class="container">
    <div class="content">
        <div class="team1" [attr.color-scheme]="game().team1.teamColor.colorScheme">
            <div class="team-score">
                <ch-team-score [team]="game().team1" [score]="game().team1Score" [teamNumber]="1"
                    [throwIndex]="(game().rounds.length + 1) % 2">
                </ch-team-score>
            </div>
        </div>
        <div class="team2" [attr.color-scheme]="game().team2.teamColor.colorScheme">
            <div class="team-score">
                <ch-team-score [team]="game().team2" [score]="game().team2Score" [teamNumber]="2"
                    [throwIndex]="(game().rounds.length + 1) % 2">
                </ch-team-score>
            </div>
        </div>
    </div>
</div>
