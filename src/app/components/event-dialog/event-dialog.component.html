<h2 mat-dialog-title>{{ title }}</h2>

<div mat-dialog-content>
    @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
    }

    <div>
        <mat-form-field>
            <mat-label>Name</mat-label>
            <input matInput [(ngModel)]="name" (keyup.enter)="save()" placeholder="Enter event name" />
        </mat-form-field>

        <mat-form-field>
            <mat-label>Event Date</mat-label>
            <input matInput type="date" [(ngModel)]="eventDate" (keyup.enter)="save()" />
        </mat-form-field>

        <mat-checkbox [(ngModel)]="complete">Complete</mat-checkbox>
    </div>
</div>

<div mat-dialog-actions align="end">
    <button type="button" mat-button (click)="cancel()">Cancel</button>
    <button type="button" mat-raised-button color="primary" (click)="save()" [disabled]="isSaving || !canSave()">
        {{ actionLabel }}
    </button>
</div>
