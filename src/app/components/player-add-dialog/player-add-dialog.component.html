<ch-card [title]="'Add Player'">
    <ng-container header>
        <button type="button" mat-icon-button class="button--close" (click)="onCancel()">
            <i class="fas fa-times"></i>
        </button>
    </ng-container>
    <ng-container content>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <mat-form-field>
                <mat-label>First Name</mat-label>
                <input matInput [(ngModel)]="firstName" (keyup.enter)="onAdd()" placeholder="Enter first name">
            </mat-form-field>

            <mat-form-field>
                <mat-label>Last Name</mat-label>
                <input matInput [(ngModel)]="lastName" (keyup.enter)="onAdd()" placeholder="Enter last name">
            </mat-form-field>

            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                <button type="button" mat-stroked-button (click)="onCancel()">Cancel</button>
                <button type="button" mat-raised-button color="primary" (click)="onAdd()"
                    [disabled]="!firstName.trim() || !lastName.trim()">
                    Add Player
                </button>
            </div>
        </div>
    </ng-container>
</ch-card>
