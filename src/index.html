<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Cornhole</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="./cornhole-favicon.ico">
  <script>
    (function (location) {
      if (location.search[1] === '/') {
        const decoded = location.search
          .slice(1)
          .split('&')
          .map((entry) => entry.replace(/~and~/g, '&'))
          .join('?');
        window.history.replaceState(null, '', location.pathname.slice(0, -1) + decoded + location.hash);
      }
    })(window.location);
  </script>
</head>

<body>
  <ch-root></ch-root>
</body>

</html>
